name: Android One-Click Production

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (example: v16.6.3)"
        required: true
        default: "v16.6.3"
      publish_github_release:
        description: "Create or update GitHub Release with APK"
        required: true
        default: true
        type: boolean
      deploy_vercel:
        description: "Deploy web app to Vercel production"
        required: true
        default: true
        type: boolean
      push_supabase:
        description: "Run supabase db push"
        required: true
        default: true
        type: boolean
      run_quality_checks:
        description: "Run lint + typecheck + build before release"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: android-one-click-prod
  cancel-in-progress: false

jobs:
  release-deploy:
    runs-on: ubuntu-latest
    env:
      APK_OUTPUT_PATH: android/app/build/outputs/apk/release/app-release.apk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Quality checks
        if: ${{ inputs.run_quality_checks }}
        run: |
          npm run lint
          npm run typecheck
          npm run build

      - name: Validate signing secrets
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          missing=0
          for key in ANDROID_RELEASE_KEYSTORE_BASE64 ANDROID_RELEASE_KEY_ALIAS ANDROID_RELEASE_STORE_PASSWORD ANDROID_RELEASE_KEY_PASSWORD; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing GitHub secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Prepare release keystore
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/keystore
          echo "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 --decode > android/keystore/vault-release.jks

      - name: Build signed APK
        env:
          ANDROID_RELEASE_KEYSTORE: android/keystore/vault-release.jks
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: npm run apk:android:release

      - name: Prepare APK artifact
        id: apk_meta
        run: |
          RELEASE_TAG="${{ inputs.release_tag }}"
          APK_NAME="vault-${RELEASE_TAG}.apk"
          mkdir -p dist
          cp "$APK_OUTPUT_PATH" "dist/$APK_NAME"
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"
          echo "apk_path=dist/$APK_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vault-apk-${{ inputs.release_tag }}
          path: ${{ steps.apk_meta.outputs.apk_path }}
          if-no-files-found: error
          retention-days: 14

      - name: Validate Supabase secrets
        if: ${{ inputs.push_supabase }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          missing=0
          for key in SUPABASE_ACCESS_TOKEN SUPABASE_PROJECT_REF SUPABASE_DB_PASSWORD; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing GitHub secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Push Supabase schema
        if: ${{ inputs.push_supabase }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          npx supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"
          npx supabase db push

      - name: Validate Vercel token
        if: ${{ inputs.deploy_vercel }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::Missing GitHub secret: VERCEL_TOKEN"
            exit 1
          fi

      - name: Deploy Vercel production
        if: ${{ inputs.deploy_vercel }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel --prod --token "$VERCEL_TOKEN" --yes

      - name: Publish GitHub Release with APK
        if: ${{ inputs.publish_github_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: Vault ${{ inputs.release_tag }}
          generate_release_notes: true
          files: ${{ steps.apk_meta.outputs.apk_path }}
