name: Android APK Release (Tag)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-apk:
    runs-on: ubuntu-latest
    env:
      APK_OUTPUT_PATH: android/app/build/outputs/apk/release/app-release.apk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Install dependencies
        run: npm ci

      - name: i18n consistency check
        run: npm run check:i18n

      - name: Validate signing secrets
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          missing=0
          for key in ANDROID_RELEASE_KEYSTORE_BASE64 ANDROID_RELEASE_KEY_ALIAS ANDROID_RELEASE_STORE_PASSWORD ANDROID_RELEASE_KEY_PASSWORD; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing GitHub secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Prepare release keystore
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/keystore
          echo "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 --decode > android/keystore/vault-release.jks

      - name: Build signed APK
        env:
          ANDROID_RELEASE_KEYSTORE: android/keystore/vault-release.jks
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: npm run apk:android:release

      - name: Package release asset
        id: apk_meta
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          APK_NAME="vault-${TAG_NAME}.apk"
          cp "$APK_OUTPUT_PATH" "$APK_NAME"
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vault-apk-${{ github.ref_name }}
          path: ${{ steps.apk_meta.outputs.apk_name }}
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Vault ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ steps.apk_meta.outputs.apk_name }}
